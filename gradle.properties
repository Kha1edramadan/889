org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
org.gradle.daemon=true
org.gradle.parallel=true

# Fix: AGP 9.x disallows KSP from registering sources via kotlin.sourceSets DSL.
# This flag suppresses the error until KSP releases a version that uses android.sourceSets.
android.disallowKotlinSourceSets=false
